<div class="container mt-4" style="max-width: 500px;">
  <h2 class="mb-4">Add School</h2>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">School Name</label>
      <input type="text" class="form-control" [(ngModel)]="name" name="name" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Type</label>
      <select class="form-select" [(ngModel)]="type" name="type" required>
        <option value="" disabled selected>Select type</option>
        <option value="Private">Private</option>
        <option value="Public">Public</option>
        <option value="International">International</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">City</label>
      <input type="text" class="form-control" [(ngModel)]="city" name="city" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Address</label>
      <input type="text" class="form-control" [(ngModel)]="address" name="address" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Principal Name</label>
      <input type="text" class="form-control" [(ngModel)]="principalName" name="principalName" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Principal Mobile</label>
      <input type="text" class="form-control" [(ngModel)]="principalMobile" name="principalMobile" required />
    </div>

    <button type="submit" class="btn btn-primary">Save School</button>
    <a routerLink="/schools" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
